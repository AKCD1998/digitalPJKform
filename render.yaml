services:
  - type: web
    name: digitalpjkform
    runtime: node
    plan: free
    rootDir: .
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: npm ci
    preDeployCommand: npm run migrate --workspace backend && npm run syncBranchesFromFiles --workspace backend
    startCommand: npm run start --workspace backend
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "1h"
      - key: CEO_NAME_TH
        value: "ทรงพล ลิ้มพิสูจน์"
      - key: CORS_ORIGIN
        value: "https://digitalpjkformsite.onrender.com"
      - key: LOGIN_RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: LOGIN_RATE_LIMIT_MAX
        value: "5"
      - key: PDF_WRITE_SAMPLE
        value: "false"
      - key: PDF_SAMPLE_DIR
        value: ""

  - type: web
    name: digitalpjkformsite
    runtime: static
    plan: free
    rootDir: .
    autoDeploy: true
    buildCommand: npm ci && npm run build --workspace frontend
    staticPublishPath: frontend/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://digitalpjkform.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
